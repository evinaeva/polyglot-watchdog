name: Pytest

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements.txt pytest

      - name: Run deterministic compliance subset
        env:
          PYTHONPATH: .
        run: |
          # Deterministic offline subset covering audited change-set behaviors.
          pytest -q \
            tests/test_phase1_planning_input.py \
            tests/test_review_and_rerun.py \
            tests/test_phase6_review_pipeline.py \
            tests/test_interactive_capture_acceptance.py \
            tests/test_image_coverage_model.py \
            tests/test_phase3_logical_fields.py
