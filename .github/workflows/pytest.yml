name: pytest

on:
  push:
  pull_request:

jobs:
  deterministic-pytest:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install deterministic test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r .github/ci/requirements-pytest.txt

      - name: Run deterministic coverage subset
        run: |
          set -euo pipefail
          PYTHONPATH=. pytest -q \
            tests/test_phase1_planning_input.py::test_phase1_planning_rows_match_snapshot_fixture \
            tests/test_review_and_rerun.py::ReviewAndRerunTests::test_exact_context_job_resolves_single_job \
            tests/test_review_and_rerun.py::ReviewAndRerunTests::test_exact_context_job_uses_url_scoped_recipe_to_avoid_false_ambiguity \
            tests/test_review_and_rerun.py::ReviewAndRerunTests::test_exact_context_job_rejects_ambiguous_state_resolution \
            tests/test_phase1_recipe_execution.py::Phase1RecipeExecutionTests::test_recipe_marker_matching_drift_regression \
            tests/test_phase6_review_pipeline.py::test_weak_ocr_suppresses_strong_meaning_claims_and_adds_quality_evidence \
            tests/test_phase6_review_pipeline.py::test_provider_disabled_mode_is_deterministic_and_offline \
            tests/test_phase6_review_pipeline.py::test_ai_mode_missing_key_falls_back_without_changing_category \
            tests/test_phase4_ocr.py::test_phase4_ocr_schema_accepts_ok_skipped_failed_rows \
            tests/test_stage_b_operator_flow_api.py::test_review_persisted_and_joined_in_contexts
