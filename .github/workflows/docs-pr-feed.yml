name: Docs PR Feed

on:
  pull_request:
    types: [closed]

permissions:
  contents: write

jobs:
  append-feed:
    if: ${{ github.event.pull_request.merged == true && github.event.pull_request.base.ref == 'main' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Switch to DOCS_AUTOUPDATE
        run: |
          git fetch origin DOCS_AUTOUPDATE || true
          if git show-ref --verify --quiet refs/remotes/origin/DOCS_AUTOUPDATE; then
            git checkout -B DOCS_AUTOUPDATE origin/DOCS_AUTOUPDATE
          else
            git checkout -B DOCS_AUTOUPDATE
          fi

      - name: Append merged PR feed entry
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python .github/docs_autoupdate/scripts/update_merged_pr_feed.py

      - name: Commit and push feed update
        run: |
          git add docs/auto/merged_pr_feed.md
          if git diff --cached --quiet; then
            echo "No feed changes to commit."
            exit 0
          fi
          git commit -m "chore(docs-auto): append merged PR #${{ github.event.pull_request.number }} to feed"
          git push origin DOCS_AUTOUPDATE
