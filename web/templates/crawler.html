<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Polyglot Watchdog - Capture Console</title>
  <link rel="stylesheet" href="/static/styles.css" />
  <link rel="stylesheet" href="/static/theme-graph.css" />
</head>
<body>
  {{header}}
  <main>
    <h1>Capture Console + Review</h1>
    <div class="controls">
      <input id="domainInput" value="en.example.com" placeholder="domain" />
      <input id="runIdInput" placeholder="run id" />
      <input id="languagesInput" value="en,fr" placeholder="languages csv" />
      <input id="viewportsInput" value="desktop,mobile" placeholder="viewports csv" />
      <input id="tiersInput" value="guest" placeholder="tiers csv" />
      <label><input type="checkbox" id="includeRecipes" /> baseline + recipes</label>
      <button id="planButton">Plan</button>
      <button id="startButton">Start capture jobs</button>
      <select id="reviewStatusFilter"><option value="">all statuses</option><option value="valid">valid</option><option value="retry_requested">retry_requested</option><option value="blocked_by_overlay">blocked_by_overlay</option><option value="not_found">not_found</option></select>
      <button id="refreshButton">Refresh status</button>
    </div>
    <div id="captureError" class="hidden" style="color:#b00020; margin:8px 0;"></div>

    <h2>Deterministic capture plan</h2>
    <table>
      <thead><tr><th>#</th><th>url</th><th>recipe</th><th>language</th><th>viewport</th><th>tier</th><th>state</th><th>mode</th></tr></thead>
      <tbody id="planBody"></tbody>
    </table>

    <h2>Run progress</h2>
    <table>
      <thead><tr><th>run_id</th><th>job_id</th><th>status</th><th>type</th></tr></thead>
      <tbody id="runsBody"></tbody>
    </table>

    <h2>Capture contexts review</h2>
    <table>
      <thead><tr><th>context_id</th><th>url</th><th>language</th><th>state</th><th>viewport</th><th>tier</th><th>elements</th><th>screenshot</th><th>review_status</th><th>actions</th></tr></thead>
      <tbody id="contextsBody"></tbody>
    </table>
  </main>
  <script src="/static/i18n.js"></script>
  <script src="/static/crawler.js"></script>
  <script src="/static/nav-active.js"></script>
  <script src="/static/auth.js"></script>
</body>
</html>
