<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Polyglot Watchdog - CHOOSE NEEDED</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  {{header}}
  <main>
    <h1>CHOOSE NEEDED</h1>
    <p>Review captured items for this workflow run, then keep or ignore each item.</p>
    <p>
      <a id="pullsBackToRunHub" href="/workflow">Previous step</a> |
      <a id="continueCheckLanguages" href="#">Next step: Check Languages</a>
    </p>
    <p id="pullsWorkflowContextSummary" class="muted"></p>

    <div class="controls">
      <label for="pullsUrlSearch">Search by URL</label>
      <input id="pullsUrlSearch" type="search" placeholder="Type part of a URL" />
      <label for="pullsElementTypeFilter">Element Type</label>
      <select id="pullsElementTypeFilter">
        <option value="">All types</option>
      </select>
    </div>

    <details>
      <summary>Advanced links and metadata</summary>
      <p>
        <a id="pullsOpenContexts" href="#">Open Contexts</a> |
        <a id="pullsOpenIssues" href="#">Open Issues</a>
      </p>
      <p id="pullsIdHelp" class="inline-help"></p>
    </details>

    <div id="pullsStatus"></div>
    <p id="pullsLanguageSummary" class="hidden"></p>
    <table id="pullsTable" class="hidden">
      <thead><tr><th>URL</th><th>Item/Element ID</th><th>Element Type</th><th>Preview/Snippet</th><th>Decision</th><th>Action</th></tr></thead>
      <tbody></tbody>
    </table>
  </main>
  <script src="/static/i18n.js"></script>
  <script src="/static/api-client.js"></script>
  <script src="/static/pulls.js"></script>
  <script src="/static/nav-active.js"></script>
  <script src="/static/auth.js"></script>
</body>
</html>
