<!doctype html>
<html lang="ru">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Polyglot Watchdog - Issue Detail</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>

    <h1>Issue Detail</h1>

    <div id="issueDetailStatus"></div>

    <section id="issueCore"></section>

        <a id="detailOpenContexts" href="#">Related Contexts</a> |
        <a id="detailOpenPulls" href="#">Items/Pulls</a>

  </main>
  <script src="/static/i18n.js"></script>
  <script src="/static/api-client.js"></script>
  <script src="/static/issues-detail.js"></script>
  <script src="/static/nav-active.js"></script>
