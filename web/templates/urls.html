<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Polyglot Watchdog - Seed URLs</title>
  <link rel="stylesheet" href="/static/styles.css" />
  <link rel="stylesheet" href="/static/theme-graph.css" />
</head>
<body>
  {{header}}
  <main>
    <h1>Seed URLs (source of truth)</h1>
    <div class="controls">
      <label>Domain <input id="domainInput" value="en.wikipedia.org" /></label>
      <button id="loadButton">Load</button>
    </div>
    <div class="controls">
      <button id="replaceButton">Replace list</button>
      <button id="addButton">Add to list</button>
      <button id="clearButton">Clear</button>
    </div>
    <p>Updated at: <span id="updatedAt">-</span></p>
    <div id="errorBox" class="hidden" style="color:#b00020; margin-bottom: 8px;"></div>
    <textarea id="urlsMultiline" rows="7" style="width: 100%;" placeholder="One URL per line"></textarea>

    <h2>Domain URL config</h2>
    <table>
      <thead><tr><th>URL</th><th>recipe_ids</th><th>active</th><th>has_recipe</th><th>status</th><th>actions</th></tr></thead>
      <tbody id="savedUrlsBody"></tbody>
    </table>
  </main>
  <script src="/static/urls.js"></script>
  <script src="/static/nav-active.js"></script>
  <script src="/static/auth.js"></script>
</body>
</html>
