<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Polyglot Watchdog - Seed URLs</title>
  <link rel="stylesheet" href="/static/styles.css" />
  <link rel="stylesheet" href="/static/theme-graph.css" />
</head>
<body>
  {{header}}
  <main>
    <h1>ADD URL</h1>
    <p>Choose a domain, load existing URLs, and update your working URL list.</p>
    <div class="controls">
      <label>Domain
        <input id="domainInput" list="domainSuggestions" value="" autocomplete="off" />
        <datalist id="domainSuggestions"></datalist>
      </label>
      <button id="loadButton">Load existing</button>
    </div>
    <p>Updated at: <span id="updatedAt">-</span></p>
    <div id="errorBox" class="hidden" role="alert" aria-live="assertive" style="color:#b00020; margin-bottom: 8px;"></div>
    <div id="statusBox" class="hidden" role="status" aria-live="polite" style="margin-bottom: 8px;"></div>
    <textarea id="urlsMultiline" rows="7" style="width: 100%;" placeholder="One URL per line"></textarea>
    <div class="controls urls-actions">
      <button id="replaceButton">Replace list</button>
      <button id="addButton">Add to list</button>
      <button id="clearButton">Clear list</button>
      <a id="continueFirstRun" class="ui-action-button" href="#">Continue to First Run</a>
    </div>

    <h2>Domain URL config</h2>
    <table>
      <thead><tr><th>URL</th><th>Active</th><th>Save</th><th>Delete</th></tr></thead>
      <tbody id="savedUrlsBody"></tbody>
    </table>
  </main>
  <script src="/static/i18n.js"></script>
  <script src="/static/urls.js"></script>
  <script src="/static/nav-active.js"></script>
  <script src="/static/auth.js"></script>
</body>
</html>
