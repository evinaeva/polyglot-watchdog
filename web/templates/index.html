<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Polyglot Watchdog - SEE ERRORS</title>
  <link rel="stylesheet" href="/static/styles.css" />
  <link rel="stylesheet" href="/static/button-fx.css" />
  <link rel="stylesheet" href="/static/theme-graph.css" />
</head>
<body data-i18n-title="index.page_title">
  {{header}}
  <main>
    <h1>SEE ERRORS</h1>
    <p>Review and filter captured issues for a selected domain and run.</p>
    <p><a id="issuesBackToCheckLanguages" href="/check-languages">Back to Check Languages</a></p>
    <p id="workflowContextSummary" class="muted"></p>

    <div class="controls">
      <input id="domainInput" placeholder="domain" />
      <input id="languageFilter" placeholder="language" />
      <input id="issueQuery" placeholder="search" />
      <button id="applyIssueQuery" type="button">Apply</button>
    </div>

    <details>
      <summary>Advanced filters &amp; run override</summary>
      <div class="controls">
        <input id="runIdInput" placeholder="run id (optional override)" />
        <input id="severityFilter" placeholder="severity" />
        <input id="stateFilter" placeholder="state" />
        <input id="typeFilter" placeholder="issue type" />
        <input id="urlFilter" placeholder="url contains" />
        <input id="domainFilter" placeholder="domain substring in URL" />
        <button id="exportIssuesCsv" type="button">Export CSV</button>
      </div>
    </details>

    <div id="issueStatus"></div>
    <p id="issueCount" class="hidden"></p>
    <table id="issuesTable" class="hidden">
      <thead><tr><th>Error/Issue</th><th>URL</th><th>Language</th><th>Severity</th><th>Open details</th></tr></thead>
      <tbody></tbody>
    </table>
  </main>
  <script src="/static/button-fx.js"></script>
  <script src="/static/i18n.js"></script>
  <script src="/static/tooltips.js"></script>
  <script src="/static/api-client.js"></script>
  <script src="/static/index.js"></script>
  <script src="/static/nav-active.js"></script>
  <script src="/static/auth.js"></script>
</body>
</html>
