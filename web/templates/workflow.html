<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Polyglot Watchdog - FIRST RUN</title>
  <link rel="stylesheet" href="/static/styles.css" />
  <link rel="stylesheet" href="/static/button-fx.css" />
  <link rel="stylesheet" href="/static/theme-graph.css" />
</head>
<body>
  {{header}}
  <main class="workflow-page">
    <h1 class="page-title">FIRST RUN<span class="page-title-subtitle">Launch your first capture, monitor progress, or continue from an existing run.</span></h1>

    <section>
      <div class="workflow-block-inner">
        <h2>First run setup</h2>
        <div class="controls">
          <label for="wfDomain">Domain</label>
          <select id="wfDomain"></select>
          <button id="wfRefreshUrls" type="button">Refresh URL list</button>
        </div>
        <div class="controls">
          <button id="wfStartCapture" type="button">Start first run</button>
        </div>
        <div class="controls">
          <label for="wfExistingRuns">Existing runs</label>
          <select id="wfExistingRuns">
            <option value="">No runs found</option>
          </select>
          <button id="wfUseExistingRun" type="button" disabled>Use selected run</button>
        </div>
        <p id="wfRunsStatus" class="muted"></p>
      </div>
    </section>

    <section>
      <div class="workflow-block-inner">
        <h2>Block C · Review contexts</h2>
        <div id="wfContextsStatus" class="muted"></div>
        <table id="wfContextsTable" class="hidden">
          <thead><tr><th>URL</th><th>Language</th><th>State</th><th>Viewport</th><th>User tier</th><th>Elements</th><th>Screenshot</th><th>Review</th></tr></thead>
          <tbody id="wfContextsBody"></tbody>
        </table>
      </div>
    </section>

    <section>
      <div class="workflow-block-inner">
        <h2>Capture progress and next step</h2>
        <div id="wfStatus"></div>
        <dl id="wfStatusSummary" class="key-value"></dl>
        <div class="controls">
          <a id="wfContinuePulls" class="ui-action-button" data-button-fx="on" href="#" aria-disabled="true">Continue to Choose Needed &gt;</a>
        </div>
      </div>
    </section>
  </main>
  <script src="/static/button-fx.js"></script>
  <script src="/static/i18n.js"></script>
  <script src="/static/api-client.js"></script>
  <script src="/static/capture-review.js"></script>
  <script src="/static/workflow.js"></script>
  <script src="/static/nav-active.js"></script>
  <script src="/static/auth.js"></script>
</body>
</html>
