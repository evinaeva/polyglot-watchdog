<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Login — Polyglot Watchdog</title>
<link rel="stylesheet" href="/static/theme-graph.css" />
<link rel="stylesheet" href="/static/button-fx.css" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: #0f1117; color: #e2e8f0;
    min-height: 100vh; display: flex;
    align-items: center; justify-content: center;
  }
  .card {
    background: #1a1d27; border: 1px solid #2d3148;
    border-radius: 14px; padding: 40px 36px;
    width: 100%; max-width: 380px;
  }
  .logo { font-size: 32px; margin-bottom: 8px; }
  h1 { font-size: 20px; font-weight: 600; color: #a78bfa; margin-bottom: 4px; }
  .sub { color: #64748b; font-size: 13px; margin-bottom: 28px; }
  label { display: block; font-size: 13px; color: #94a3b8; margin-bottom: 6px; }
  input[type="password"] {
    width: 100%; background: #0f1117; border: 1px solid #2d3148;
    border-radius: 8px; padding: 11px 14px; color: #e2e8f0;
    font-size: 15px; outline: none; transition: border 0.2s; margin-bottom: 20px;
  }
  input[type="password"]:focus { border-color: #7c3aed; }
  button {
    width: 100%; padding: 12px;
    background: linear-gradient(135deg, #7c3aed, #6d28d9);
    color: white; border: none; border-radius: 8px;
    font-size: 15px; font-weight: 600; cursor: pointer;
  }
  button:hover { filter: brightness(1.06); }
  .hint { margin-top: 12px; color: #64748b; font-size: 12px; text-align: center; }
  .error {
    background: rgba(239, 68, 68, 0.12); color: #fecaca;
    border: 1px solid rgba(239, 68, 68, 0.4);
    border-radius: 8px; padding: 10px 12px;
    font-size: 13px; margin-bottom: 14px;
  }
</style>
</head>
<body data-i18n-title="login.page_title">
  <div class="card">
    <div class="logo">🔐</div>
    <h1 data-i18n="login.title">Polyglot Watchdog</h1>
    <div class="sub" data-i18n="login.subtitle">Please enter the access password</div>

    {{error_block}}

    <form method="post" action="/login">
      <label for="password" data-i18n="login.password">Password</label>
      <input id="password" name="password" type="password" required autofocus>
      <input type="hidden" name="csrf_token" value="{{csrf_token}}">
      <button type="submit" data-i18n="login.submit">Log In</button>
    </form>


    <div class="hint" data-i18n="login.hint">Authorized access only</div>
  </div>
  <script src="/static/button-fx.js"></script>
  <script src="/static/i18n.js"></script>
</body>
</html>
