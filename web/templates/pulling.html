<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Polyglot Watchdog - Pulling</title>
  <link rel="stylesheet" href="/static/styles.css" />
  <link rel="stylesheet" href="/static/button-fx.css" />
  <link rel="stylesheet" href="/static/theme-graph.css" />
</head>
<body data-i18n-title="pulling.page_title">
  {{header}}
  <main>
    <h1>Pulling / Annotation</h1>
    <div class="controls">
      <select id="domainDropdown"></select>
      <input id="runIdInput" placeholder="run id" />
      <button id="collectPullsButton">Load elements</button>
    </div>

    <div id="pullError" class="hidden" style="color:#b00020; margin:8px 0;"></div>

    <div class="filters">
      <input id="urlFilter" placeholder="url contains" />
      <input id="stateFilter" placeholder="state" />
      <input id="languageFilter" placeholder="language" />
      <input id="viewportFilter" placeholder="viewport" />
      <input id="tierFilter" placeholder="tier" />
    </div>

    <table>
      <thead>
        <tr>
          <th>item_id</th><th>url</th><th>state</th><th>language</th><th>viewport</th><th>tier</th><th>type</th><th>text</th><th>rerun note</th><th>decision</th>
        </tr>
      </thead>
      <tbody id="pullRows"></tbody>
    </table>

    <div class="pagination">
      <button id="prevPage">Prev</button>
      <span id="pageLabel">Page 1 / 1</span>
      <button id="nextPage">Next</button>
    </div>
  </main>

  <script src="/static/button-fx.js"></script>
  <script src="/static/i18n.js"></script>
  <script src="/static/pulling.js"></script>
  <script src="/static/nav-active.js"></script>
  <script src="/static/auth.js"></script>
</body>
</html>
