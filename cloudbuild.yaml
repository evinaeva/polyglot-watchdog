steps:
  # Build the container image for the CLI pipeline.
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - '${_IMAGE}'
      - '.'

  # Push the image to Artifact Registry.
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '${_IMAGE}'

  # Create or update a Cloud Run Job for one-off CLI execution.
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
          if [ -z "${_TARGET_URL}" ] || [ "${_TARGET_URL}" = "https://example.invalid" ]; then
            echo "ERROR: _TARGET_URL is not set. Override substitution _TARGET_URL."
            exit 1
          fi

          if gcloud run jobs describe "${_JOB_NAME}" --region="${_REGION}" >/dev/null 2>&1; then
            gcloud run jobs update "${_JOB_NAME}" \
              --image="${_IMAGE}" \
              --region="${_REGION}" \
              --command=python \
              --args=pipeline/pipeline_runner.py,--url,${_TARGET_URL} \
              --set-secrets="OCR_SPACE_API_KEY=OCR_SPACE_API_KEY:latest" \
              --memory=512Mi \
              --cpu=1 \
              --task-timeout=300s \
              --max-retries=0
          else
            gcloud run jobs create "${_JOB_NAME}" \
              --image="${_IMAGE}" \
              --region="${_REGION}" \
              --command=python \
              --args=pipeline/pipeline_runner.py,--url,${_TARGET_URL} \
              --set-secrets="OCR_SPACE_API_KEY=OCR_SPACE_API_KEY:latest" \
              --memory=512Mi \
              --cpu=1 \
              --task-timeout=300s \
              --max-retries=0
          fi

  # Execute the job after deployment.
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    args:
      - 'run'
      - 'jobs'
      - 'execute'
      - '${_JOB_NAME}'
      - '--region=${_REGION}'
      - '--wait'

images:
  - '${_IMAGE}'

substitutions:
  _REGION: 'europe-west1'
  _JOB_NAME: 'polyglot-watchdog'
  _IMAGE: 'europe-west1-docker.pkg.dev/${PROJECT_ID}/polyglot-watchdog/polyglot-watchdog'
  _TARGET_URL: 'https://example.invalid'

options:
  logging: 'CLOUD_LOGGING_ONLY'
