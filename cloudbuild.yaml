steps:
  # Build the container image.
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - '${_IMAGE}'
      - '.'

  # Push the image to Artifact Registry.
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '${_IMAGE}'

  # Deploy to Cloud Run Service.
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - '${_SERVICE_NAME}'
      - '--image=${_IMAGE}'
      - '--region=${_REGION}'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=8080'
      - '--memory=1Gi'
      - '--cpu=1'
      - '--set-env-vars=ARTIFACTS_BUCKET=polyglot-watchdog-artifacts-1018698441568'

images:
  - '${_IMAGE}'

substitutions:
  _REGION: 'europe-west1'
  _SERVICE_NAME: 'polyglot-watchdog'
  _IMAGE: 'europe-west1-docker.pkg.dev/${PROJECT_ID}/polyglot-watchdog/polyglot-watchdog'

options:
  logging: 'CLOUD_LOGGING_ONLY'
